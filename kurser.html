<!doctype html>
<html lang=" <meta name="viewport" content="width=device-width, initial-scale=1" /><html lang="sv">
  <title>TFF-portal – Kurser</title>

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body>
  <a class="skip-link" href="#main">Hoppa till innehåll</a>

  <header class="hero hero--compact" role="banner">
    <div class="hero__inner">
      <a class="back" href="index.html">← Tillbaka till portalen</a>

      <h1 class="hero__title hero__title--small">
        Sök på alla kurser och moduler för TFF
      </h1>

      <form class="searchbar" role="search" aria-label="Sök kurs" onsubmit="return false;">
        <label class="sr-only" for="courseSearch">Sök</label>
        <input id="courseSearch" type="search" placeholder="Vad söker du efter?" />
        <button type="button" aria-label="Sök">🔍</button>
      </form>
    </div>
  </header>

  <main id="main" class="container" role="main">
    <section class="courses-layout" aria-label="Kurser och filter">

      <aside class="courses-sidebar" aria-label="Filter">
        <h2 class="sidebar__title">Filter</h2>

        <div class="sidebar__block">
          <h3 class="sidebar__heading">Språk</h3>
          <label class="checkbox checkbox--stack">
            <input type="checkbox" id="langSv" checked />
            <span>Swedish</span>
          </label>
        </div>

        <div class="sidebar__block">
          <h3 class="sidebar__heading">Kategorier</h3>
          <div id="categoryList" class="category-list"></div>
        </div>

        <div class="sidebar__block">
          <button class="btn btn--secondary" type="button" id="resetFilters">Rensa filter</button>
        </div>
      </aside>

      <section aria-label="Kurskort">
        <div class="courses-toolbar">
          <div class="muted" id="resultCount">0 träffar</div>
        </div>

        <div class="courses-grid" id="coursesGrid"></div>

        <nav class="pagination" aria-label="Sidnavigering" id="pagination"></nav>
      </section>

    </section>
  </main>

  <!-- Data + app -->
  <script src="assets/js/kurser-data.js"></script>
  <script src="assets/js/kurser-app.js"></script>
</body>
</html>
<head>
  <meta charset="utf-8" />
